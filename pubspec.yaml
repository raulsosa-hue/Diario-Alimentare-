name: mi_ascolto
description: Diario alimentare ed esercizio.
publish_to: "none"
version: 1.0.0+4

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  path: ^1.9.0
  flutter_sticky_header: ^0.8.0
  pdf: ^3.11.2
  printing: ^5.13.4
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: ^2.4.0+3
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
    - assets/fonts/NotoEmoji-Regular.ttf
    - assets/icons/app_icon_foreground.png

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/icons/app_icon.png"

  adaptive_icon_background: "#FCFAF5"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

  remove_alpha_ios: true
  background_color_ios: "#FCFAF5"

flutter_native_splash:
  color: "#FCFAF5"
  image: assets/icons/app_icon_foreground.png

  android: true
  ios: true

  android_12:
    color: "#FCFAF5"
    image: assets/icons/app_icon_foreground.png
    icon_background_color: "#FCFAF5"
